# wenxihuang.com — one always-on machine serving the site + API, SQLite on the
# /data volume. Always-on (no auto-stop) so silicon-sanfrancisco's SSE works
# when it lands on this machine.
#
# One-time setup before first deploy:
#   fly volumes create data --region sjc --size 1 -a wenxihuang-frontend

app = 'wenxihuang-frontend'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'
  DATABASE_PATH = '/data/site.db'
  ORIGIN = 'https://wenxihuang.com'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
